name: Docker Security Scan

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      build_context:
        required: false
        type: string
        default: "."

jobs:
  trivy-scan:
    name: "trivy scan: ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building Docker image for ${{ inputs.service_name }}"
          SERVICE_NAME_LOWER=$(echo "${{ inputs.service_name }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ inputs.service_name }}" == "Frontend" ]; then
            # Frontend uses relative path within its context
            docker build -t ${SERVICE_NAME_LOWER}-scan \
              -f Dockerfile \
              ${{ inputs.build_context }}
          else
            # Backend services use full path from project root
            docker build -t ${SERVICE_NAME_LOWER}-scan \
              -f ${{ inputs.dockerfile_path }} \
              ${{ inputs.build_context }}
          fi

      - name: Run Trivy vulnerability scanner
        run: |
          SERVICE_NAME_LOWER=$(echo "${{ inputs.service_name }}" | tr '[:upper:]' '[:lower:]')
          echo "Running Trivy scan on ${SERVICE_NAME_LOWER}-scan image"
          
          # Verify image exists
          docker images | grep "${SERVICE_NAME_LOWER}-scan" || {
            echo "❌ Error: Image ${SERVICE_NAME_LOWER}-scan not found"
            exit 1
          }
          
          # Install Trivy - simplified approach for act compatibility
          if ! which trivy >/dev/null 2>&1; then
            echo "Installing Trivy..."
            wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp
            sudo mv /tmp/trivy /usr/local/bin/
          fi
          
          # Install jq for JSON processing
          if ! which jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -qq jq
          fi
          
          echo "=== Running Security Scan ==="
          
          # First run: Generate SARIF report (no exit-code to continue on vulnerabilities)
          echo "Generating SARIF report..."
          trivy image \
            --format sarif \
            --output trivy-${{ inputs.service_name }}.sarif \
            --severity CRITICAL,HIGH \
            ${SERVICE_NAME_LOWER}-scan
          
          echo "✅ SARIF report generated successfully"
          
          # Second run: Show detailed vulnerability summary and capture for PR comment
          echo "=== Vulnerability Summary ==="
          trivy image \
            --format table \
            --severity CRITICAL,HIGH \
            ${SERVICE_NAME_LOWER}-scan > trivy-${{ inputs.service_name }}-summary.txt 2>&1 || true
          
          # Display the summary in logs
          cat trivy-${{ inputs.service_name }}-summary.txt
          
          # Generate markdown format for PR comments
          echo "## 🔒 Security Scan Results for ${{ inputs.service_name }}" > trivy-${{ inputs.service_name }}-pr-comment.md
          echo "" >> trivy-${{ inputs.service_name }}-pr-comment.md
          
          # Third run: Check for vulnerabilities and capture detailed info
          echo "=== Security Gate Check ==="
          VULN_COUNT=$(trivy image \
            --format json \
            --severity CRITICAL,HIGH \
            ${SERVICE_NAME_LOWER}-scan | jq '.Results[]?.Vulnerabilities // [] | length' | awk '{sum += $1} END {print sum+0}')
          
          if [ "$VULN_COUNT" -eq 0 ]; then
            echo "✅ No critical or high vulnerabilities found - Security gate passed"
            echo "### ✅ Security Gate: PASSED" >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "No critical or high severity vulnerabilities found in ${{ inputs.service_name }}." >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "SECURITY_STATUS=PASSED" >> $GITHUB_ENV
          else
            echo "❌ CRITICAL or HIGH vulnerabilities found! ($VULN_COUNT vulnerabilities)"
            echo "Pipeline failed for security reasons."
            echo "Check the vulnerability summary above for details."
            echo "### ❌ Security Gate: FAILED" >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "" >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "**$VULN_COUNT critical/high severity vulnerabilities found in ${{ inputs.service_name }}:**" >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "" >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo '```' >> trivy-${{ inputs.service_name }}-pr-comment.md
            cat trivy-${{ inputs.service_name }}-summary.txt >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo '```' >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "" >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "**Action Required:** Please review and address these vulnerabilities before merging." >> trivy-${{ inputs.service_name }}-pr-comment.md
            echo "SECURITY_STATUS=FAILED" >> $GITHUB_ENV
            # Still exit with error to fail the pipeline
            exit 1
          fi

      - name: Scan Dockerfile configuration
        run: |
          echo "=== Dockerfile Security Scan ==="
          if [ "${{ inputs.service_name }}" == "Frontend" ]; then
            # Frontend dockerfile is in frontend directory
            trivy config frontend/Dockerfile || echo "⚠️ Dockerfile config scan completed with warnings"
          else
            # Backend services use full path
            trivy config ${{ inputs.dockerfile_path }} || echo "⚠️ Dockerfile config scan completed with warnings"  
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: false # Disabled for local testing with act
        with:
          sarif_file: trivy-${{ inputs.service_name }}.sarif
          token: ${{ github.token }}

      - name: Comment Security Scan Results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './trivy-${{ inputs.service_name }}-pr-comment.md';
            
            try {
              const reportContent = fs.readFileSync(path, 'utf8');
              
              // Look for existing comments by this action
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const botCommentPrefix = '🔒 Security Scan Results for ${{ inputs.service_name }}';
              const existingComment = comments.find(comment => 
                comment.user.type === 'Bot' && comment.body.includes(botCommentPrefix)
              );
              
              if (existingComment) {
                // Update existing comment
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: reportContent
                });
                console.log('Updated existing security scan comment');
              } else {
                // Create new comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: reportContent
                });
                console.log('Created new security scan comment');
              }
            } catch (error) {
              console.log('Could not read security report file or create comment:', error.message);
              
              // Create a fallback comment if the report file doesn't exist
              const fallbackComment = `## 🔒 Security Scan Results for ${{ inputs.service_name }}
              
              ⚠️ **Security scan completed but report file not found.**
              
              Please check the [workflow run logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed security scan results.
              
              Status: ${{ env.SECURITY_STATUS || 'UNKNOWN' }}`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fallbackComment
              });
            }

      - name: Upload Security Scan Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-${{ inputs.service_name }}
          path: |
            trivy-${{ inputs.service_name }}.sarif
            trivy-${{ inputs.service_name }}-summary.txt
            trivy-${{ inputs.service_name }}-pr-comment.md
          retention-days: 1

      - name: Run npm audit (Frontend only)
        if: inputs.service_name == 'Frontend'
        run: |
          cd frontend
          echo "Running npm audit for frontend dependencies"
          pnpm audit --audit-level=high --json > npm-audit.json || true
          
      - name: Upload npm audit report
        if: inputs.service_name == 'Frontend'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json
          retention-days: 1