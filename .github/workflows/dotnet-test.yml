name: Dotnet Test

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      test_type:
        required: true
        type: string # unit, integration, architecture

jobs:
  test:
    name: "dotnet test (${{ inputs.test_type }}): ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run Specific Tests with Coverage
        run: |
          SERVICE_DIR=$(dirname "${{ inputs.service_path }}")
          TEST_DIR="$SERVICE_DIR/tests/${{ inputs.test_type }}"
          
          # Skip architecture tests entirely
          if [[ "${{ inputs.test_type }}" == "architecture" ]]; then
            echo "Architecture tests are currently skipped (under development)."
            exit 0
          fi
          
          if [ -d "$TEST_DIR" ]; then
            echo "Searching for test projects in $TEST_DIR"
            # Buscamos archivos .csproj de forma recursiva
            mapfile -t PROJECTS < <(find "$TEST_DIR" -name "*.csproj")
            
            if [ ${#PROJECTS[@]} -eq 0 ]; then
              echo "No .csproj found in $TEST_DIR. Skipping."
              exit 0
            fi

            mkdir -p test-results-output

            for PROJECT in "${PROJECTS[@]}"; do
              echo "--------------------------------------------------------"
              echo "Running tests for: $PROJECT"
              echo "--------------------------------------------------------"

              PROJECT_NAME=$(basename "$PROJECT" .csproj)

              # Proyectos de dominio solo miden el assembly Domain para evitar
              # falsos 0% en Application (que los domain tests no ejercitan)
              if [[ "$PROJECT_NAME" == *Domain* ]]; then
                SETTINGS="coverlet.domain.runsettings"
              else
                SETTINGS="coverlet.runsettings"
              fi

              dotnet test "$PROJECT" --configuration Release \
                --settings "$SETTINGS" \
                --collect:"XPlat Code Coverage" \
                --results-directory "./test-results-output/$PROJECT_NAME"
            done
          else
            echo "Skipping: No ${{ inputs.test_type }} tests directory found at $TEST_DIR"
          fi

      - name: Upload Coverage Artifacts
        if: always() && inputs.test_type != 'architecture'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service_name }}-${{ inputs.test_type }}
          path: test-results-output/**/*.xml
          if-no-files-found: warn
          retention-days: 1

      - name: Enforce Coverage Threshold (85%)
        if: inputs.test_type == 'unit'
        run: |
          FILES=$(find test-results-output -name "coverage.cobertura.xml" 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "No coverage files found — skipping threshold check."
            exit 0
          fi
          TV=$(echo "$FILES" | xargs grep -h '<coverage ' | grep -oE 'lines-valid="[0-9]+"' | grep -oE '[0-9]+' | awk '{s+=$1} END{print s+0}')
          TC=$(echo "$FILES" | xargs grep -h '<coverage ' | grep -oE 'lines-covered="[0-9]+"' | grep -oE '[0-9]+' | awk '{s+=$1} END{print s+0}')
          TOTAL=$(awk "BEGIN{if($TV>0) printf \"%.2f\",$TC/$TV*100; else print \"0\"}")
          echo "Combined line coverage: ${TOTAL}% (${TC} covered / ${TV} valid lines)"
          PASS=$(awk "BEGIN{print ($TOTAL >= 85) ? \"yes\" : \"no\"}")
          if [ "$PASS" != "yes" ]; then
            echo "::error::Coverage ${TOTAL}% is below the required 85% threshold."
            exit 1
          fi
          echo "Coverage check passed: ${TOTAL}% >= 85%"
