name: SonarCloud Template

on:
  workflow_call:
    inputs:
      project_key:
        required: true
        type: string
      organization:
        required: true
        type: string
      # solution_path removed as we analyze workspace
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  analyze:
    name: "Unified Monorepo analysis"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts
          pattern: coverage-*
          merge-multiple: true

      - name: List coverage files (debug)
        run: |
          echo "=== Cobertura XML files found ==="
          find coverage-artifacts -name "coverage.cobertura.xml" 2>/dev/null || echo "None found"
          echo "=== Total count ==="
          CCOUNT=$(find coverage-artifacts -name "coverage.cobertura.xml" 2>/dev/null | wc -l)
          echo "coverage_count=$CCOUNT"

      - name: Install Sonar Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Run Unified Analysis
        run: |
          # sonar.qualitygate.wait solo en main/master — plan free solo procesa esa branch
          WAIT_FOR_GATE="false"
          if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
            WAIT_FOR_GATE="true"
          fi

          # Build comma-separated list of coverage files for sonar
          COVERAGE_FILES=$(find coverage-artifacts -name "coverage.cobertura.xml" 2>/dev/null | tr '\n' ',' | sed 's/,$//')

          SCANNER_ARGS=(
            /k:"${{ inputs.project_key }}"
            /o:"${{ inputs.organization }}"
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
            /d:sonar.host.url="https://sonarcloud.io"
            /d:sonar.qualitygate.wait="$WAIT_FOR_GATE"
            /d:sonar.qualitygate.timeout=300
            /d:sonar.scanner.skipJreProvisioning=true
            /d:sonar.scm.provider=git
          )

          if [ -z "$COVERAGE_FILES" ]; then
            echo "[WARN] No coverage files found — sonar will report 0% coverage"
          else
            echo "[INFO] Coverage files: $COVERAGE_FILES"
            SCANNER_ARGS+=("/d:sonar.cs.cobertura.reportsPaths=$COVERAGE_FILES")
          fi

          dotnet-sonarscanner begin "${SCANNER_ARGS[@]}"

          # Compilamos todos los servicios para que Sonar analice el código fuente completo
          dotnet build speckit-ticketing.sln -c Release /p:AnalyzeBySonar=true
          # Waitlist no está en speckit-ticketing.sln — se compila por separado
          dotnet build services/waitlist/Waitlist.sln -c Release /p:AnalyzeBySonar=true

          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
